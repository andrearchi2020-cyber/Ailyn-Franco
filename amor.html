<html>
<head>
    <title>Ailyn Franco</title>
    <style>
        body {
            background-color: white;
            color: black;
            font-family: Arial, sans-serif;
        }
        .falling {
            position: absolute;
            animation: fall 5s linear infinite;
        }
        @keyframes fall {
            0% { top: -10%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <h1>Ailyn Franco</h1>
    <p>Mi amor empezó por ti desde el 23 de octubre de 2023</p>
    <div class="falling" style="left: 50%; width: 50px;">🌼</div>
    <script>
        const startDate = new Date('2023-10-23T00:00:00Z');
        const currentDate = new Date();
        const timer = Math.max((currentDate - startDate) / 1000, 0);
        console.log('Time since start:', timer);
    </script>
</body>
</html>
