<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=360, initial-scale=1.0">
<title>Amor</title>
<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#ff0f8f,#6b003f);
  overflow:hidden;
  font-family:Arial;
}
.container{
  width:360px;
  height:640px;
  background:#f7e9df;
  border-radius:25px;
  position:relative;
  overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}
/* 💖 nombre animado */
.name{
  position:absolute;
  top:25px;
  width:100%;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  color:#ff0f8f;
  animation:latido 1.2s infinite;
  text-shadow:0 0 10px rgba(255,0,128,0.7);
}
@keyframes latido{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.1);}
}
/* 💖 corazones */
.heart{
  position:absolute;
  width:15px;
  height:15px;
  background:rgba(255,255,255,0.2);
  transform:rotate(45deg);
  animation:float 8s linear infinite;
}
.heart::before,.heart::after{
  content:"";
  position:absolute;
  width:15px;
  height:15px;
  background:inherit;
  border-radius:50%;
}
.heart::before{left:-7px;}
.heart::after{top:-7px;}
@keyframes float{
  from{transform:translateY(100%) rotate(45deg);}
  to{transform:translateY(-120%) rotate(45deg);}
}
/* texto */
.text{
  position:absolute;
  top:90px;
  left:20px;
  right:20px;
  font-size:20px;
}
/* contador */
.timer{
  position:absolute;
  bottom:20px;
  left:20px;
  right:20px;
  font-size:18px;
  font-weight:bold;
}
/* árbol */
.tree{
  position:absolute;
  bottom:80px;
  right:20px;
  width:220px;
  height:220px;
}
.trunk{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:14px;
  height:60px;
  background:#8b5a2b;
}
.heart-tree{
  position:absolute;
  width:100%;
  height:100%;
  clip-path:path("M110 200 C 20 140, 10 70, 60 40 C 90 20,110 50,110 50 C110 50,130 20,160 40 C210 70,200 140,110 200 Z");
}
.flower{
  position:absolute;
  width:10px;
  height:10px;
  background:yellow;
  border-radius:50%;
  box-shadow:0 0 6px gold;
}
/* flores cayendo */
.fall{
  position:absolute;
  width:8px;
  height:8px;
  background:yellow;
  border-radius:50%;
  animation:fall 6s linear infinite;
}
@keyframes fall{
  from{transform:translateY(-10px);}
  to{transform:translateY(700px);}
}
</style>
</head>
<body>
<div class="container" id="box">
  <div class="name">💖 Ailyn Franco 💖</div>
  <div class="text">
    🌼 Flores Amarillas para el amor de mi vida:<br><br>
    Si pudiera darte todo lo que siento,
    te daría el tiempo entero de mi vida...
  </div>
  <div class="timer">
    Mi amor por ti comenzó hace:<br>
    <span id="contador"></span>
  </div>
  <div class="tree">
    <div class="heart-tree" id="flowers"></div>
    <div class="trunk"></div>
  </div>
</div>
<script>
// corazones
for(let i=0;i<20;i++){  
  let h=document.createElement("div");
  h.className="heart";
  h.style.left=Math.random()*100+"%";
  h.style.animationDuration=(5+Math.random()*5)+"s";
  document.getElementById("box").appendChild(h);
}
// flores árbol
const container=document.getElementById("flowers");
for(let i=0;i<120;i++){  
  let f=document.createElement("div");
  f.className="flower";
  f.style.left=Math.random()*100+"%";
  f.style.top=Math.random()*100+"%";
  container.appendChild(f);
}
// flores cayendo
for(let i=0;i<25;i++){  
  let f=document.createElement("div");
  f.className="fall";
  f.style.left=Math.random()*100+"%";
  f.style.animationDuration=(4+Math.random()*4)+"s";
  document.getElementById("box").appendChild(f);
}
// contador
const startDate=new Date("2023-10-23T00:00:00");
function actualizar(){
  const now=new Date();
  let diff=now-startDate;
  let s=Math.floor(diff/1000);
  let d=Math.floor(s/86400);
  s%=86400;
  let h=Math.floor(s/3600);
  s%=3600;
  let m=Math.floor(s/60);
  s%=60;
  document.getElementById("contador").innerHTML=
    `${d} días ${h} horas ${m} minutos ${s} segundos`;
}
setInterval(actualizar,1000);
actualizar();
</script>
<!-- 🎵 AGREGA AQUÍ TU CANCIÓN -->
<!-- Descarga "Extrañarte - Jay Wheeler" y ponla como musica.mp3 -->
<audio autoplay loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>
</body>
</html>
