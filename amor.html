<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ailyn Franco</title>
    <style>
        body {
            background-color: #fefec5;
            color: #444;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            margin-top: 20px;
        }
        .tulips {
            animation: fall 5s infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-150px); opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
        .genealogical-tree {
            margin: 20px auto;
            width: 60%;
        }
        #timer {
            font-size: 2em;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <h1>Ailyn Franco</h1>
    <div class="tulips">
        <img src="tulip.png" height="50" class="tulips" alt="Falling Tulips">
    </div>
    <p>Mi amor empezó por ti desde el 23 de octubre de 2023</p>
    <div class="genealogical-tree">
        <img src="genealogical_tree.png" alt="Chocolate Genealogical Tree" style="width:100%;">
    </div>
    <div id="timer"></div>
    <script>
        const start = new Date('2023-10-23T00:00:00Z');
        function updateTimer() {
            const now = new Date();
            const diff = now - start;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('timer').innerHTML = `Time since: ${days}d ${hours}h ${minutes}m ${seconds}s`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
