<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Ailyn Franco</title>\n    <style>\n        body {\n            margin: 0;\n            height: 100vh;\n            background: linear-gradient(to bottom, #ff99cc, #ffccff);\n        }\n        .border-flower {\n            position: absolute;\n            left: 0;\n            top: 0;\n            bottom: 0;\n            width: 20px;\n            background-image: url('white_flowers.png'); // Replace with your image path\n            background-repeat: no-repeat;\n            animation: moveFlowers 5s linear infinite;\n        }\n        @keyframes moveFlowers {\n            from {\n                transform: translateY(0);\n            }\n            to {\n                transform: translateY(-100vh);\n            }\n        }\n        .falling-tulip {\n            position: absolute;\n            width: 30px;\n            animation: fall 4s linear infinite;\n        }\n        @keyframes fall {\n            from {\n                top: -5%;\n                opacity: 1;\n            }\n            to {\n                top: 100%;\n                opacity: 0;\n            }\n        }\n        .timer {\n            position: fixed;\n            bottom: 20px;\n            right: 20px;\n            font-size: 20px;\n            background-color: rgba(255, 255, 255, 0.8);\n            padding: 10px;\n            border-radius: 10px;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"border-flower\"></div>\n    <div class=\"timer\">Current Time: <span id=\"time\"></span></div>\n    <script>\n        function updateTimer() {\n            const date = new Date('2023-10-23T00:00:00Z');\n            const now = new Date();\n            const diff = Math.floor((now - date) / 1000);\n            document.getElementById('time').textContent = new Date(diff * 1000).toISOString().substr(11, 8);\n        }\n        setInterval(updateTimer, 1000);\n        updateTimer();\n    </script>\n</body>\n</html>
