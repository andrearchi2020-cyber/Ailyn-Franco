<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ailyn Franco</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            position: relative;
            overflow: hidden;
        }
        h1 {
            animation: heartbeat 1s infinite;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .heart {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: red;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }
        #fallingFlowers {
            position: absolute;
            top: -10%;
            animation: fall 5s linear infinite;
        }
        @keyframes fall {
            0% { top: -10%; }
            100% { top: 110%; }
        }
        .counter {
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Ailyn Franco</h1>
    
    <div class="heart"></div>
    <div class="heart" style="left: 50px;"></div>
    <div class="heart" style="left: 100px;"></div>

    <div id="fallingFlowers">
        <img src="yellow_flower.png" alt="Flower" style="width: 20px; position: absolute;"/>
    </div>

    <div class="counter" id="liveCounter"></div>
    
    <script>
        const startDate = new Date('2023-10-23T00:00:00Z');
        const counterElement = document.getElementById('liveCounter');

        function updateCounter() {
            const now = new Date();
            const timeDifference = Math.floor((now - startDate) / (1000 * 60));
            counterElement.textContent = `Time since October 23, 2023: ${timeDifference} minutes`;
        }

        setInterval(updateCounter, 60000);
        updateCounter();
    </script>

    <p>May every love blossom like these flowers!</p>
</body>
</html>
