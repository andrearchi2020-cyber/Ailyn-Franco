<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ailyn Franco - Mi Amor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Segoe UI', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 3.5rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            animation: heartbeat 1.2s ease-in-out infinite;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .subtitle {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
            font-style: italic;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .hearts-container {
            position: relative;
            height: 80px;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .heart {
            width: 50px;
            height: 50px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        .heart svg {
            width: 100%;
            height: 100%;
            fill: #ff6b9d;
            filter: drop-shadow(0 2px 4px rgba(255, 107, 157, 0.4));
        }

        .heart:nth-child(1) {
            animation-delay: 0s;
        }

        .heart:nth-child(2) {
            animation-delay: 0.3s;
        }

        .heart:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .counter-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .counter-title {
            font-size: 1.3rem;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .counter-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .time-unit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s ease;
        }

        .time-unit:hover {
            transform: translateY(-5px);
        }

        .time-value {
            font-size: 2.5rem;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        .time-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .counter-text {
            font-size: 1.2rem;
            color: #764ba2;
            font-style: italic;
            line-height: 1.6;
        }

        .flowers-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .flower {
            position: absolute;
            font-size: 2rem;
            opacity: 0.6;
            animation: fall linear infinite;
        }

        .flower-1 { animation-duration: 6s; }
        .flower-2 { animation-duration: 7s; animation-delay: 1s; }
        .flower-3 { animation-duration: 8s; animation-delay: 2s; }
        .flower-4 { animation-duration: 6.5s; animation-delay: 0.5s; }
        .flower-5 { animation-duration: 7.5s; animation-delay: 1.5s; }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0.8;
            }
            50% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .message {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.95);
            font-style: italic;
            margin-top: 40px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.1);
            border-left: 5px solid #ff6b9d;
            border-radius: 10px;
            line-height: 1.8;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .stars {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        footer {
            position: relative;
            z-index: 10;
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }

            .counter-section {
                padding: 25px;
            }

            .time-value {
                font-size: 2rem;
            }

            .message {
                font-size: 1.1rem;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="flowers-container" id="flowersContainer"></div>

    <div class="container">
        <h1>✨ Ailyn Franco ✨</h1>
        <p class="subtitle">Cada momento contigo es especial</p>

        <div class="hearts-container">
            <div class="heart">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
            </div>
            <div class="heart">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
            </div>
            <div class="heart">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
            </div>
        </div>

        <div class="counter-section">
            <h2 class="counter-title">Tiempo Juntos</h2>
            <div class="counter-display" id="counterDisplay">
                <div class="time-unit">
                    <span class="time-value" id="days">0</span>
                    <span class="time-label">Días</span>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="hours">0</span>
                    <span class="time-label">Horas</span>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="minutes">0</span>
                    <span class="time-label">Minutos</span>
                </div>
                <div class="time-unit">
                    <span class="time-value" id="seconds">0</span>
                    <span class="time-label">Segundos</span>
                </div>
            </div>
            <p class="counter-text" id="liveCounter"></p>
        </div>

        <div class="message">
            🌸 Que cada día sea una razón para sonreír 🌸<br>
            Te amo más de lo que las palabras pueden expresar
        </div>

        <footer>
            <p>Hecho con ❤️ para ti</p>
        </footer>
    </div>

    <script>
        const startDate = new Date('2023-10-23T00:00:00Z');

        function updateCounter() {
            const now = new Date();
            const timeDifference = now - startDate;

            const days = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDifference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDifference % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;

            const months = Math.floor(days / 30);
            const remainingDays = days % 30;

            document.getElementById('liveCounter').textContent = 
                `${months > 0 ? months + ' mes' + (months > 1 ? 'es' : '') + ', ' : ''}${remainingDays} día${remainingDays !== 1 ? 's' : ''} juntos`;
        }

        // Update counter every second
        setInterval(updateCounter, 1000);
        updateCounter();

        // Generate falling flowers
        const flowersContainer = document.getElementById('flowersContainer');
        const flowers = ['🌹', '🌸', '🌼', '🌻', '💐'];

        function createFlower() {
            const flower = document.createElement('div');
            flower.className = `flower flower-${Math.floor(Math.random() * 5) + 1}`;
            flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
            flower.style.left = Math.random() * 100 + '%';
            flower.style.top = -50 + 'px';
            flowersContainer.appendChild(flower);

            setTimeout(() => {
                flower.remove();
            }, 8000);
        }

        // Create flowers every 500ms
        setInterval(createFlower, 500);
    </script>
</body>
</html>
