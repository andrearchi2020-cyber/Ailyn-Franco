<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ailyn Franco - Love Page</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(to right, pink, lavender);
            color: #fff;
            font-family: 'Arial', sans-serif;
            animation: fadeIn 2s;
        }
        h1 {
            animation: heartBeat 1s infinite;
        }
        @keyframes heartBeat {
            0%, 100% {transform: scale(1);} 
            50% {transform: scale(1.1);} 
        }
        @keyframes fadeIn {
            from {opacity: 0;} 
            to {opacity: 1;} 
        }
        .timer {
            font-size: 2em;
            margin: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 1.2em;
            background-color: #ff69b4;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% {transform: translateY(0);} 
            50% {transform: translateY(-10px);} 
        }
    </style>
</head>
<body>
    <h1>Ailyn Franco</h1>
    <div class="timer" id="timer"></div>
    <button onclick="playMusic()">Play Music</button>

    <script>
        function updateTimer() {
            const startDate = new Date('2023-10-23');
            const currentDate = new Date();
            const daysDiff = Math.floor((currentDate - startDate) / (1000 * 60 * 60 * 24));
            document.getElementById('timer').innerText = daysDiff + ' days since October 23, 2023';
        }
        function playMusic() {
            // Music file will be added here
            alert('Music playback functionality is not implemented.');
        }
        updateTimer();
    </script>
</body>
</html>
